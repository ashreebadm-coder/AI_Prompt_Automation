name: AI Browser E2E Tests

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  run-ai-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          npm install @playwright/test @google/gemini-cli

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Gemini Environment
        run: |
          mkdir -p /home/runner/.gemini

      - name: Run Gemini Browser Tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          B4IGO_PRIVATE_KEY: ${{ secrets.B4IGO_PRIVATE_KEY }}
        run: |
          export HOME=/home/runner

          # Create Gemini config in correct HOME
          mkdir -p $HOME/.gemini
          rm -f $HOME/.gemini/projects.json

          : > test-report.txt

          if [ -z "$GEMINI_API_KEY" ] || [ -z "$B4IGO_PRIVATE_KEY" ]; then
            echo "Missing required secrets"
            echo "RESULT: FAIL" > test-report.txt
            exit 1
          fi

          export CI=true

          PROMPT=$(cat <<EOF
          Test URL: https://www.predev.b4igo.com/restore-keys-qr
          Private Key: ${B4IGO_PRIVATE_KEY}

          Run all test cases and generate report.
          EOF
          )

          set +e

          npx gemini -p "$PROMPT" > gemini-output.txt 2>&1
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "RESULT: PASS" > test-report.txt
          else
            echo "RESULT: FAIL" > test-report.txt
          fi

          cat gemini-output.txt >> test-report.txt
          cat test-report.txt

          exit $EXIT_CODE

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-test-report
          path: test-report.txt