name: AI Browser E2E Tests

# Trigger the test manually or every time code is pushed to the main branch
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-ai-tests:
    runs-on: ubuntu-latest # You can also use windows-latest if your CLI requires Windows

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (for Playwright/MCP dependencies)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm Dependencies
        run: |
          npm install @playwright/test @google/gemini-cli

      - name: Install Playwright Browsers (Required for the Agent)
        run: npx playwright install --with-deps chromium

      - name: Run Gemini Browser Tests
        env:
          GEMINI_API_KEY: ${{ secrets.API_KEY }}
          B4IGO_PRIVATE_KEY: ${{ secrets.B4IGO_PRIVATE_KEY }}
          PROMPT_TEMPLATE: |
            --------
            Need help in testing B4iGo Web application.

            Also go through the base-code to understand the context.
            Do not generate Playwright code, execute in browser in headless mode.

            I want you to understand everything so that you can test B4iGo application and give me a report based on the test cases below.

            Test case 1: Add New Subscription
            In the Chrome web browser, open URL: https://www.predev.b4igo.com/restore-keys-qr

            Private Key: ${B4IGO_PRIVATE_KEY}

            1. Login to the B4igo application using the private key given.
            2. Click Digital Vault card.
            3. Verify Digital Vault page is loaded.
            4. Open My Subscriptions.
            5. Add a new Subscription record.
            6. Verify the subscription is added successfully.

            Test case 2: Edit Subscription
            1. Open the existing Subscription record created in Test case 1.
            2. Edit the Subscription details.
            3. Save changes.
            4. Verify the subscription is updated successfully.

            Test case 3: Delete Subscription
            1. Open the existing Subscription record updated in Test case 2.
            2. Delete the Subscription record.
            3. Confirm delete action.
            4. Verify the subscription is deleted successfully.

            Generate final report in this format:
            - Test case name
            - Steps executed
            - Expected result
            - Actual result
            - Status (Pass/Fail)
            - Failure reason (if any)
            - Close the Browser

            After generating the report, close the browser.
            --------
        run: |
          : > test-report.txt
          if [ -z "$GEMINI_API_KEY" ] || [ -z "$B4IGO_PRIVATE_KEY" ]; then
            echo "Missing required secrets: API_KEY and/or B4IGO_PRIVATE_KEY"
            echo "RESULT: FAIL" > test-report.txt
            echo "Missing required secrets: API_KEY and/or B4IGO_PRIVATE_KEY" >> test-report.txt
            exit 1
          fi
          set +e
          PROMPT="${PROMPT_TEMPLATE//\$\{B4IGO_PRIVATE_KEY\}/$B4IGO_PRIVATE_KEY}"
          npx gemini --prompt "$PROMPT" > gemini-output.txt 2>&1
          test_exit_code=$?
          if [ $test_exit_code -eq 0 ]; then
            echo "RESULT: PASS" > test-report.txt
          else
            echo "RESULT: FAIL" > test-report.txt
          fi
          echo "" >> test-report.txt
          cat gemini-output.txt >> test-report.txt
          cat test-report.txt
          exit $test_exit_code

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-test-report
          path: test-report.txt