name: AI Browser E2E Tests

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  run-ai-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          npm install @playwright/test @google/gemini-cli

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Gemini Environment
        run: |
          export HOME=/home/runner
          mkdir -p $HOME/.gemini
          touch $HOME/.gemini/projects.json

      - name: Run Gemini Browser Tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          B4IGO_PRIVATE_KEY: ${{ secrets.B4IGO_PRIVATE_KEY }}
        run: |
          : > test-report.txt

          # Validate secrets
          if [ -z "$GEMINI_API_KEY" ] || [ -z "$B4IGO_PRIVATE_KEY" ]; then
            echo "Missing required secrets: GEMINI_API_KEY or B4IGO_PRIVATE_KEY"
            echo "RESULT: FAIL" > test-report.txt
            exit 1
          fi

          export CI=true
          export HOME=/home/runner

          PROMPT=$(cat <<EOF
          --------
          Need help in testing B4iGo Web application.

          Do not generate Playwright code. Execute directly in browser (headless).

          Test URL:
          https://www.predev.b4igo.com/restore-keys-qr

          Private Key:
          ${B4IGO_PRIVATE_KEY}

          Test case 1: Add New Subscription
          1. Login using private key
          2. Click Digital Vault
          3. Open My Subscriptions
          4. Add new subscription
          5. Verify record added

          Test case 2: Edit Subscription
          1. Open created record
          2. Edit details
          3. Save
          4. Verify update

          Test case 3: Delete Subscription
          1. Open record
          2. Delete it
          3. Confirm delete
          4. Verify removal

          Generate final report with:
          - Test case
          - Steps
          - Expected
          - Actual
          - Status
          - Failure reason

          Close browser after execution.
          --------
          EOF
          )

          set +e

          npx gemini -p "$PROMPT" > gemini-output.txt 2>&1
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "RESULT: PASS" > test-report.txt
          else
            echo "RESULT: FAIL" > test-report.txt
          fi

          echo "" >> test-report.txt
          cat gemini-output.txt >> test-report.txt

          cat test-report.txt

          exit $EXIT_CODE

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-test-report
          path: test-report.txt