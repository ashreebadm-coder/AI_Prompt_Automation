name: AI Browser E2E Tests

# Trigger the test manually or every time code is pushed to the main branch
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-ai-tests:
    runs-on: ubuntu-latest # You can also use windows-latest if your CLI requires Windows

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (for Playwright/MCP dependencies)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm Dependencies
        run: |
          npm install @playwright/test @google/gemini-cli

      - name: Install Playwright Browsers (Required for the Agent)
        run: npx playwright install --with-deps chromium

      - name: Run Gemini Browser Tests
        env:
          GEMINI_API_KEY: ${{ secrets.API_KEY }}
          B4IGO_PRIVATE_KEY: ${{ secrets.B4IGO_PRIVATE_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ] || [ -z "$B4IGO_PRIVATE_KEY" ]; then
            echo "Missing required secrets: API_KEY and/or B4IGO_PRIVATE_KEY"
            exit 1
          fi

          npx gemini --prompt "
          Execute the following automated UI test cases for the B4iGo Web application.
          Use your Browser tool in HEADLESS mode. Execute the steps as quickly and efficiently as possible. Do not write Playwright code; perform the clicks and inputs directly.

          **Setup Instructions:**
          - Target URL: https://www.predev.b4igo.com/restore-keys-qr
          - Private Key: ${B4IGO_PRIVATE_KEY}

          **Test case 1: Add New Subscription**
          1. Navigate to the Target URL and restore access using the provided Private Key. Log in.
          2. Click on the 'Digital | Online Accounts Vault' card.
          3. Open the 'My Subscriptions' tab.
          4. Click the 'Add +' button.
          5. Fill the subscription form with the following exact data:
             - Subscription Type: 'Others'
             - Service Name: 'AutomatedTestFi'
             - Username/Email: 'auto@test.com'
          6. Submit the form to save.
          7. Verification: Verify that 'AutomatedTestFi' now appears in the My Subscriptions table.

          **Test case 2: Edit Subscription**
          1. In the My Subscriptions table, locate 'AutomatedTestFi' and click its Manage (Gear) icon.
          2. Click the Edit (pencil) icon.
          3. Change the Service Name to 'AutomatedTestFi Edited'.
          4. Submit the changes.
          5. Verification: Verify that the table now displays 'AutomatedTestFi Edited'.

          **Test case 3: Delete Subscription**
          1. Click the Manage (Gear) icon for 'AutomatedTestFi Edited'.
          2. Click the Delete (trash) icon.
          3. Confirm the deletion in the popup.
          4. Verification: Verify that the record is no longer visible in the table.

          **Final Actions:**
          1. Generate a final execution report.
          2. Once the final report is generated, gracefully end your browser session / close the browser.
          " | tee test-report.txt

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-test-report
          path: test-report.txt